# Loop course with the central island split into left and right halves. A north-south through passage runs down the center.
#
# Layout overview:
#   - Surrounded on all four sides by an outer wall (120 x 80, thickness 5)
#   - A left central island (30 x 25) is placed at (35, 40)
#   - A right central island (30 x 25) is placed at (85, 40)
#   - The gap between the islands (x=50..70) is a north-south through passage (20 m wide)
#   - In addition to driving the outer loop counterclockwise / clockwise,
#     it is also possible to drive a figure-eight by passing through the central passage
#   - Both left and right turns occur, which reduces bias in the training data
#
# Corridor width (actual drivable area):
#   bottom / top = 22.5 m, left / right = 15 m, central passage = 20 m
world:
  height: 80.0
  width: 120.0

obstacle:
  # Outer wall (bottom)
  - shape: { name: "rectangle", length: 120.0, width: 5.0 }
    state: [60.0, 2.5, 0]
  # Outer wall (top)
  - shape: { name: "rectangle", length: 120.0, width: 5.0 }
    state: [60.0, 77.5, 0]
  # Outer wall (left)
  - shape: { name: "rectangle", length: 5.0, width: 70.0 }
    state: [2.5, 40.0, 0]
  # Outer wall (right)
  - shape: { name: "rectangle", length: 5.0, width: 70.0 }
    state: [117.5, 40.0, 0]

  # Left central island
  - shape: { name: "rectangle", length: 30.0, width: 25.0 }
    state: [35.0, 40.0, 0]
  # -> occupies x=20..50, y=27.5..52.5

  # Right central island
  - shape: { name: "rectangle", length: 30.0, width: 25.0 }
    state: [85.0, 40.0, 0]
  # -> occupies x=70..100, y=27.5..52.5

  # Central obstacle (swings the line left and right at the center of the passage)
  - shape: { name: "rectangle", length: 30.0, width: 5.0 }
    state: [60.0, 40.0, 0]


  # Small obstacles on the top straight
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [25.0, 68.0, 0]
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [60.0, 65.0, 0]
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [95.0, 68.0, 0]

  # Small obstacles on the bottom straight
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [25.0, 12.0, 0]
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [60.0, 15.0, 0]
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [95.0, 12.0, 0]

  # Small obstacles in the left corridor
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [12.0, 40.0, 0]

  # Small obstacles in the right corridor
  - shape: { name: "rectangle", length: 1.5, width: 1.5 }
    state: [108.0, 40.0, 0]
