# 評価用スタート位置のリスト
# 各エントリは [x, y, yaw_rad, steering_initial]
# yaw はラジアン (0=東, π/2=北, π=西, -π/2=南)
# 時計回り (CW) と反時計回り (CCW) の両方向を評価する
starts:
  - [35.0, 15.0, 3.14159, 0.0]  # 下コリドール左、西向き → CW
  - [35.0, 15.0, 0.0, 0.0]      # 下コリドール左、東向き → CCW
  - [85.0, 65.0, 0.0, 0.0]      # 上コリドール右、東向き → CW
  - [85.0, 65.0, 3.14159, 0.0]  # 上コリドール右、西向き → CCW
