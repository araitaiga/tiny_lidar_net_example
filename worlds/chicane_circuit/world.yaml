# 右折ベース + 2 か所左折の周回コース。
#
# レイアウト概要:
#   - 外周壁 (120 x 80, 厚さ 5) で四方を囲む
#   - 中央島 (70 x 30) を配置し、その周囲を時計回りに走行する
#     → 4 コーナーは全て右折
#   - 上側コリドール (x=55 付近) と下側コリドール (x=65 付近) に
#     シケインブロックを 1 つずつ配置。ループ内で点対称になる位置とした
#       * 上側 (東進): 内側島の北面から北へ突き出すブロック → 北に逃げる = 左折
#       * 下側 (西進): 内側島の南面から南へ突き出すブロック → 南に逃げる = 左折
#     これにより 1 周中に左折が 2 回発生する
#
# コリドール幅 (実走行可能領域):
#   下/上 = 20 m,  左/右 = 20 m (シケイン部分は 10 m に絞られる)
world:
  height: 80.0
  width: 120.0

obstacle:
  # 外周壁（下）
  - shape: {name: 'rectangle', length: 120.0, width: 5.0}
    state: [60.0, 2.5, 0]
  # 外周壁（上）
  - shape: {name: 'rectangle', length: 120.0, width: 5.0}
    state: [60.0, 77.5, 0]
  # 外周壁（左）
  - shape: {name: 'rectangle', length: 5.0, width: 70.0}
    state: [2.5, 40.0, 0]
  # 外周壁（右）
  - shape: {name: 'rectangle', length: 5.0, width: 70.0}
    state: [117.5, 40.0, 0]

  # 中央島（メイン）
  - shape: {name: 'rectangle', length: 60.0, width: 30.0}
    state: [50.0, 40.0, 0]
  # → x=25..95, y=25..55 を占有

  # 左折ポイント 1 (上側シケイン): 中央島の上面 (y=55) から北へ突き出すブロック
  # 上側コリドール (y=55..75) のうち y=55..65 を塞ぐため、東向き走行中の
  # クルマは y≈70 まで北へ逃げる必要がある = 左折
  - shape: {name: 'rectangle', length: 14.0, width: 10.0}
    state: [55.0, 60.0, 0]

  # 左折ポイント 2 (下側シケイン): 中央島の下面 (y=25) から南へ突き出すブロック
  # 下側コリドール (y=5..25) のうち y=15..25 を塞ぐため、西向き走行中の
  # クルマは y≈10 まで南へ逃げる必要がある = 左折
  # 位置は上側シケインと点対称 (x=65) とした
  - shape: {name: 'rectangle', length: 14.0, width: 10.0}
    state: [65.0, 20.0, 0]

  # 下側ストレートの小障害物 (下側シケインから離した位置)
  - shape: {name: 'rectangle', length: 1.5, width: 1.5}
    state: [40.0, 12.0, 0]
  - shape: {name: 'rectangle', length: 1.5, width: 1.5}
    state: [95.0, 13.0, 0]

  # 上側ストレートの小障害物 (シケインから離した位置)
  - shape: {name: 'rectangle', length: 1.5, width: 1.5}
    state: [90.0, 70.0, 0]
  - shape: {name: 'rectangle', length: 20.0, width: 16.0}
    state: [105.0, 67.0, 0]

  # 左コリドールの小障害物
  - shape: {name: 'rectangle', length: 1.5, width: 1.5}
    state: [13.0, 30.0, 0]
  - shape: {name: 'rectangle', length: 2.0, width: 2.0}
    state: [10.0, 55.0, 0]

  # 右コリドールの小障害物
  - shape: {name: 'rectangle', length: 1.5, width: 1.5}
    state: [108.0, 30.0, 0]
  - shape: {name: 'rectangle', length: 20.0, width: 20.0}
    state: [90.0, 35.0, 0]
